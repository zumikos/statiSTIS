<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>statiSTIS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>

<body>

<header>
    <h1><a class="site-title" href="index.html">statiSTIS</a></h1>

    <nav>
        <a href="index.html">Domů</a>
        <a href="skokani.html">Skokani sezóny</a>
        <a href="zebricky.html">Žebříčky</a>
        <a href="hraci.html">Hráči</a>
    </nav>
</header>

<main>

    <section class="hero">
        <h2>Statistiky ze STISu</h2>
        <p>Statistiky založené na veřejně dostupných žebříčcích ze systému STIS</p>

    </section>

    <section class="grid two-columns">
        <article class="card">
            <h3>Top 10 skokani <span id="home-movers-season"></span></h3>
            <table id="home-movers" class="compact-table"></table>
            <a class="button" href="skokani.html">Celý žebříček</a>
        </article>

        <article class="card">
            <h3>Top 10 hráči <span id="home-ranking-season"></span></h3>
            <table id="home-ranking" class="compact-table"></table>
            <a class="button" href="zebricky.html">Celý žebříček</a>
        </article>
    </section>

    <section class="grid two-columns">

        <article class="card">
            <h3>Vývoj počtu hráčů</h3>
            <div id="home-player-count" class="home-chart"></div>
            <p class="chart-note">* covid</p>
        </article>

        <article class="card">
            <h3>Rozložení STR v sezóně <span id="home-histogram-season"></span></h3>
            <div id="home-histogram" class="home-chart"></div>
        </article>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="js/config.js"></script>
<script src="js/home.js"></script>

</body>
</html>
