<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>statiSTIS</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>

</head>

<body>

<header>

<h1>statiSTIS</h1>

<nav>

<a href="index.html">Domů</a>
<a href="skokani.html">Skokani sezóny</a>
<a href="zebricky.html">Žebříčky</a>
<a href="hraci.html">Hráči</a>

</nav>

</header>

<main>

<section id="player-search-view">
    <h2>Hráči</h2>
    <p>Vyhledejte hráče podle jména nebo STIS ID.</p>

    <form id="player-search-form" class="player-search" role="search">
        <label class="visually-hidden" for="player-search-input">Jméno nebo STIS ID</label>
        <input id="player-search-input" type="search" placeholder="Jméno nebo STIS ID" autocomplete="off">
        <button type="submit" aria-label="Vyhledat" title="Vyhledat">&#128269;</button>
    </form>

    <p id="player-search-status" class="status-message" aria-live="polite"></p>
    <div id="player-results"></div>
</section>

<section id="player-detail-view" hidden>
    <a href="hraci.html" class="back-link">← Zpět na vyhledávání</a>
    <h2 id="player-name"></h2>
    <p id="player-info"></p>
    <div class="table-scroll">
        <table id="player-history"></table>
    </div>
    <section class="player-chart-section">
        <h3>Vývoj STR</h3>
        <div id="player-str-chart" class="player-str-chart"></div>
        <p class="chart-note">Přerušení čáry znamená, že pro danou sezónu nejsou dostupná data.</p>
    </section>
</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="js/config.js"></script>
<script src="js/players.js"></script>

</body>
</html>
